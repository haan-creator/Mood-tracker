  renderJournalItems();

  // Back button
  document.getElementById('journal-back').addEventListener('click', closeJournal);

  // Tab switching
  page.querySelectorAll('.journal-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      page.querySelectorAll('.journal-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      journalState.filter = btn.dataset.filter;
      renderJournalItems();
      window.scrollTo(0, 0);
    });
  });

  // Search input (debounced)
  const searchInput = document.getElementById('journal-search-input');
  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      journalState.search = searchInput.value;
      renderJournalItems();
      window.scrollTo(0, 0);
    }, 150);
  });

  // Sort toggle
  const sortBtn = document.getElementById('journal-sort-btn');
  const sortLabel = document.getElementById('journal-sort-label');
  const updateSortUI = () => {
    if (journalState.sortDir === 'asc') {
      sortBtn.classList.add('asc');
      sortLabel.textContent = '最舊在前';
    } else {
      sortBtn.classList.remove('asc');
      sortLabel.textContent = '最新在前';
    }
  };
  updateSortUI();
  sortBtn.addEventListener('click', () => {
    journalState.sortDir = journalState.sortDir === 'desc' ? 'asc' : 'desc';
    updateSortUI();
    renderJournalItems();
    window.scrollTo(0, 0); // jump back to top after resort
  });

  // Scroll-to-top button
  const scrollTopBtn = document.getElementById('journal-scroll-top');
  scrollTopBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Infinite scroll (load more when near bottom) + scroll-to-top visibility
  const onScroll = () => {
    if (!document.getElementById('page-journal').classList.contains('active')) return;
    const scrollY = window.scrollY;
    const scrollBottom = window.innerHeight + scrollY;
    const pageHeight = document.documentElement.scrollHeight;

    // Load more
    const filtered = filterJournalEntries();
    const totalDays = groupEntriesByDay(filtered).length;
    if (journalState.rendered < totalDays && pageHeight - scrollBottom < 300) {
      renderJournalItems(true);
    }

    // Scroll-to-top visibility: show after scrolling down 400px
    if (scrollY > 400) {
      scrollTopBtn.classList.add('visible');
    } else {
      scrollTopBtn.classList.remove('visible');
    }
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  // Store to remove on close
  page._onScroll = onScroll;
}

function closeJournal() {
  const page = document.getElementById('page-journal');
  if (page._onScroll) {
    window.removeEventListener('scroll', page._onScroll);
    page._onScroll = null;
  }
  page.classList.remove('active');
  page.innerHTML = '';
  document.getElementById('page-main').classList.add('active');
  // Scroll back to top
  window.scrollTo(0, 0);
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const allData = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('mood:') || key.startsWith('cycle:')) {
      try { allData[key] = JSON.parse(localStorage.getItem(key)); } catch {}
    }
  }
  const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mood-backup-${curYear}${String(curMonth+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function sanitizeEntry(entry) {
  if (typeof entry !== 'object' || entry === null) return null;
  const type = entry.type === 'negative' ? 'negative' : 'positive';
  const score = typeof entry.score === 'number'
    ? Math.max(0, Math.min(100, Math.round(entry.score))) : null;
  const note = typeof entry.note === 'string'
    ? entry.note.replace(/\0/g, '').slice(0, 500) : '';
  if (score === null) return null;
  return { type, score, note };
}

function sanitizeMonthData(val) {
  if (typeof val !== 'object' || val === null || Array.isArray(val)) return null;
  const out = {};
  for (const [dk, dayVal] of Object.entries(val)) {
    if (!/^\d{1,2}$/.test(dk)) continue;
    if (typeof dayVal !== 'object' || dayVal === null) continue;
    const dayOut = {};
    for (const pk of PERIOD_KEYS) {
      if (dayVal[pk] != null) {
        const clean = sanitizeEntry(dayVal[pk]);
        if (clean) dayOut[pk] = clean;
      }
    }
    if (Object.keys(dayOut).length > 0) out[dk] = dayOut;
  }
  return Object.keys(out).length > 0 ? out : null;
}

function sanitizeCycleData(val) {
  if (typeof val !== 'object' || val === null || Array.isArray(val)) return null;
  const out = {};
  for (const [dk, dayVal] of Object.entries(val)) {
    if (!/^\d{1,2}$/.test(dk)) continue;
    if (typeof dayVal !== 'object' || dayVal === null) continue;
    const clean = {};
    if (dayVal.pms === true) clean.pms = true;
    if (dayVal.period === true) clean.period = true;
    if (Object.keys(clean).length > 0) out[dk] = clean;
  }
  return Object.keys(out).length > 0 ? out : null;
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert('檔案過大（上限 5MB），請確認是否為正確的備份檔案');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      Object.entries(data).forEach(([key, val]) => {
        if (/^mood:\d{4}-\d{2}$/.test(key)) {
          const clean = sanitizeMonthData(val);
          if (clean) { localStorage.setItem(key, JSON.stringify(clean)); count++; }
        } else if (/^cycle:\d{4}-\d{2}$/.test(key)) {
          const clean = sanitizeCycleData(val);
          if (clean) { localStorage.setItem(key, JSON.stringify(clean)); count++; }
        }
      });
      alert(`已匯入 ${count} 筆月份資料`);
      loadData();
      renderCalendar();
      closeStats();
    } catch {
      alert('檔案格式錯誤，請選擇正確的備份檔案');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
